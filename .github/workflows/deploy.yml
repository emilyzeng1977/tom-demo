name: Deploy

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Select environment'
        required: true
        type: choice
        options:
          - dev
          - prod

      version:
        description: 'Image version (e.g. 1.2.0)'
        required: true

concurrency:
  group: deploy-${{ github.event.inputs.env }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-east-1

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    # ✅ 审批点（关键）
    environment:
      name: approval-${{ github.event.inputs.env }}

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ github.event.inputs.version }}

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Push image
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.event.inputs.version }}

          docker tag app:${{ github.event.inputs.version }} $IMAGE_URI
          docker push $IMAGE_URI

          echo "✅ Deployed $IMAGE_URI to ${{ github.event.inputs.env }}"