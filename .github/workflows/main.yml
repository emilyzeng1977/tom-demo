name: tom-demo-cicd-pipeline

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      env:
        description: 'Select environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: ${{ github.ref }}-1
  cancel-in-progress: true

env:
  AWS_REGION: ap-east-1

permissions:
  id-token: write
  contents: write

# ======================
# BUILD
# ======================
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - run: ./mvnw -B -ntp clean package

  # ======================
  # TEST
  # ======================
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - run: mvn -B verify

  # ======================
  # RELEASE（核心）
  # ======================
  release:
    name: Semantic Release
    needs: [build, test]
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22   # ✅ 修复 Node 版本问题

      - name: Install deps
        run: npm install

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # ======================
  # BUILD IMAGE
  # ======================
  docker:
    name: Build Docker Image
    needs: release
    runs-on: ubuntu-latest

    if: needs.release.outputs.version != ''

    outputs:
      image-tag: ${{ needs.release.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - run: ./mvnw -B -ntp clean package

      - name: Build Docker image
        run: |
          docker build -t app:${{ needs.release.outputs.version }} .

      - name: Save Docker image
        run: docker save app:${{ needs.release.outputs.version }} -o image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  # ======================
  # PUSH IMAGE（带审批）
  # ======================
  push-image:
    needs: docker
    runs-on: ubuntu-latest

    environment:
      name: approval-${{ github.event.inputs.env || 'dev' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - run: docker load -i image.tar

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Push image
        run: |
          # IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ needs.docker.outputs.image-tag }}
          # docker tag app:${{ needs.docker.outputs.image-tag }} $IMAGE_URI
          # docker push $IMAGE_URI
          echo "Simulating image push for version ${{ needs.docker.outputs.image-tag }} to environment ${{ github.event.inputs.env }}"
