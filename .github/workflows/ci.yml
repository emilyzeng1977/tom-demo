name: CI + Release + Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-east-1

jobs:

  # ======================
  # 1. BUILD
  # ======================
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build & Test
        run: ./mvnw -B clean verify

  # ======================
  # 2. RELEASE
  # ======================
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: build

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Version
        id: version
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # ======================
  # 3. IMAGE BUILD & PUSH DEV (APPROVAL 1)
  # ======================
  image-build-dev:
    name: Image Build & Push (DEV)
    runs-on: ubuntu-latest
    needs: release

    environment:
      name: approval-dev   # 👈 第一次审批

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build JAR
        run: ./mvnw -B package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Image (DEV)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ needs.release.outputs.version }}

  # ======================
  # 4. IMAGE BUILD & PUSH PROD (APPROVAL 2)
  # ======================
  image-build-push:
    name: Image Build & Push (PROD)
    runs-on: ubuntu-latest
    needs: release

    environment:
      name: approval-prod   # 👈 第二次独立审批

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build JAR
        run: ./mvnw -B package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Image (PROD)
        run: |
          echo "Pushing image to PROD with tag: ${{ needs.release.outputs.version }}"