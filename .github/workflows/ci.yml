name: CI + Release

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-east-1

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # ======================
      # CHECKOUT
      # ======================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ======================
      # SETUP JAVA
      # ======================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # ======================
      # BUILD
      # ======================
      - name: Build
        run: ./mvnw -B -ntp clean package

      # ======================
      # TEST
      # ======================
      - name: Test
        run: mvn -B verify

      # ======================
      # COMMITLINT（PR）
      # ======================
      - name: Commitlint (PR commits)
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        run: |
          BASE=$(git merge-base origin/${{ github.base_ref }} HEAD)
          npx commitlint --from=$BASE --to=HEAD

      - name: Commitlint (PR title)
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        run: |
          echo "${{ github.event.pull_request.title }}" | npx commitlint

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      # ======================
      # CHECKOUT
      # ======================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ======================
      # SETUP NODE（semantic-release）
      # ======================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ======================
      # INSTALL
      # ======================
      - name: Install
        run: npm install

      # ======================
      # SEMANTIC RELEASE
      # ======================
      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ======================
      # READ VERSION
      # ======================
      - name: Read version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.version != ''

    outputs:
      image-tag: ${{ needs.release.outputs.version }}

    steps:
      # ======================
      # CHECKOUT
      # ======================
      - name: Checkout
        uses: actions/checkout@v4

      # ======================
      # SETUP JAVA
      # ======================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # ======================
      # BUILD（确保最新版本）
      # ======================
      - name: Build
        run: ./mvnw -B -ntp clean package

      # ======================
      # DOCKER BUILD
      # ======================
      - name: Build Docker image
        run: |
          docker build -t app:${{ needs.release.outputs.version }} .

      # ======================
      # SAVE ARTIFACT（可选）
      # ======================
      - name: Save Docker image
        run: docker save app:${{ needs.release.outputs.version }} -o image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ needs.release.outputs.version }}
          path: image.tar