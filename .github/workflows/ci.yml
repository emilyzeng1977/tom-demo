name: CI + Release (Backend)

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

  push:
    branches:
      - "**"

  workflow_dispatch:
    inputs:
      env:
        required: true

permissions:
  id-token: write
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  # ======================
  # BUILD + TEST
  # ======================
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # ======================
      # CHECKOUT
      # ======================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ======================
      # SETUP JAVA
      # ======================
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # ======================
      # BUILD + TEST
      # ======================
      - name: Build & Test
        run: ./mvnw -B clean verify


  # ======================
  # COMMITLINT（PR only new commits）
  # ======================
  commitlint:
    name: Commitlint (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install
        run: yarn install --frozen-lockfile

      # ======================
      # COMMIT LINT (ONLY NEW COMMITS)
      # ======================
      - name: Commitlint (PR commits)
        run: |
          BASE=$(git merge-base origin/${{ github.base_ref }} HEAD)

          git log $BASE..HEAD --pretty=format:"%s" | while read msg; do
            echo "$msg" | npx commitlint
          done

      # ======================
      # PR TITLE CHECK
      # ======================
      - name: Commitlint (PR title)
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        run: |
          echo "${{ github.event.pull_request.title }}" | npx commitlint


  # ======================
  # RELEASE（仅 main）
  # ======================
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: build

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      # ======================
      # CHECKOUT
      # ======================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ======================
      # SETUP NODE（semantic-release 必需）
      # ======================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ======================
      # INSTALL
      # ======================
      - name: Install
        run: npm install

      # ======================
      # SEMANTIC RELEASE
      # ======================
      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ======================
      # GET VERSION (from pom.xml)
      # ======================
      - name: Get version (from pom.xml)
        id: version
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT


# ======================
# IMAGE BUILD & PUSH - DEV
# ======================
image-build-push:
  name: Image Build & Push (DEV)
  needs: release
  runs-on: ubuntu-latest

  if: github.ref == 'refs/heads/main' && github.event_name == 'push'

  environment:
    name: approval-dev   # 👈 DEV 审批点

  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Build JAR
      run: ./mvnw -B package -DskipTests

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: ${{ secrets.AWS_ROLE }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build & Push Image (DEV)
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ needs.release.outputs.version }}


# ======================
# IMAGE BUILD & PUSH - PROD
# ======================
image-build-push-prod:
  name: Image Build & Push (PROD)
  needs: image-build-push
  runs-on: ubuntu-latest

  if: github.ref == 'refs/heads/main' && github.event_name == 'push'

  environment:
    name: approval-prod   # 👈 PROD 审批点

  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: ${{ secrets.AWS_ROLE }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Promote Image to PROD
      run: |
        IMAGE=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ needs.release.outputs.version }}

        echo "Promoting image to PROD: $IMAGE"